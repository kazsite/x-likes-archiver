{
  "extractor": {
    "base-directory": "/tmp/downloads",
    "user-agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36 Edg/146.0.0.0",
    "twitter": {
      "directory": ["{author[name]}"],
      "filename": "{date:%Y-%m-%d_%H-%M-%S}_{tweet_id}_{num:01}.{extension}",
      "retweets": false,
      "quoted": false,
      "replies": false,
      "size": "orig",
      "videos": false,
      "sleep": 2.0,
      "sleep-request": 2.0,
      "sleep-429": 90.0,
      "retries": 2
    }
  }
}
